<!DOCTYPE html>
<html>
<head>
    <title>Task Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Task Details</h2>

    <p><b>ID:</b> {{ task.id }}</p>
    <p><b>Name:</b> {{ task.name }}</p>
    <p><b>Status:</b> 
        {% if task.done %}Completed{% else %}Pending{% endif %}
    </p>

    <a href="/">⬅ Back</a>
</div>

</body>
</html>
